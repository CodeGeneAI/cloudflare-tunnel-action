name: update-major-tag

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token via the CodeGeneAI App so the
      # forced tag pushes are attributed to the App and bypass branch-protection
      # restrictions on `actions[bot]` if any are added later.
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: 2479570
          private-key: ${{ secrets.CODEGENEAI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Move floating major and minor tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "Skipping non-semver release tag: $RELEASE_TAG"
            exit 0
          fi
          MAJOR="v${BASH_REMATCH[1]}"
          MINOR="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          git config user.name "codegeneai[bot]"
          git config user.email "codegeneai[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$RELEASE_TAG"
          git tag -f "$MINOR" "$RELEASE_TAG"
          git push origin "$MAJOR" "$MINOR" --force
