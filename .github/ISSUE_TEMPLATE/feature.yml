name: Feature request
description: Suggest a new capability or input.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution. We may have a better fit in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape (optional)
      description: A YAML snippet, an input/output sketch, or a pseudo-code example.
      render: yaml
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
